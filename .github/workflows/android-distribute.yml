name: Android Build & Distribute to Firebase

on:
  pull_request:
    types:
      - labeled
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-distribute:
    name: Build Android & Distribute to Firebase
    runs-on: ubuntu-latest
    environment: development

    # ⭐ KEY LOGIC: chỉ chạy khi PR có label build-for-test
    if: |
      contains(
        github.event.pull_request.labels.*.name,
        'build-for-test'
      )

    steps:
      - name: Checkout PR code (merged state)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Ruby (for Fastlane)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1.6'
          bundler-cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: |
          bundle install

      - name: Setup Keystore for signing
        run: |
          echo "${{ secrets.SNAPLET_KEYSTORE_BASE64 }}" | base64 -d > app/snaplet-release-key.jks
          
          # Tạo local.properties với thông tin keystore từ Environment Secrets
          cat > local.properties << EOF
          sdk.dir=\$ANDROID_HOME
          SNAPLET_KEYSTORE_FILE=snaplet-release-key.jks
          SNAPLET_KEYSTORE_PASSWORD=${{ secrets.SNAPLET_KEYSTORE_PASSWORD }}
          SNAPLET_KEY_ALIAS=${{ secrets.SNAPLET_KEY_ALIAS }}
          SNAPLET_KEY_PASSWORD=${{ secrets.SNAPLET_KEY_PASSWORD }}
          EOF
          
          ls -lh app/snaplet-release-key.jks
          cat local.properties | grep -v PASSWORD

      - name: Build & Distribute via Fastlane
        env:
          FIREBASE_CLI_TOKEN: ${{ secrets.FIREBASE_CLI_TOKEN }}
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          export RELEASE_NOTES="$COMMIT_MESSAGE"
          bundle exec fastlane build_test

      # 🏷️ CI tự đổi label sau khi build xong
      - name: Update PR labels after success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);

            if (labels.includes('build-for-test')) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                name: 'build-for-test'
              });
            }

            if (!labels.includes('ready-for-test')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['ready-for-test']
              });
            }
