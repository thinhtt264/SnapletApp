name: Update Linked Issue Status

on:
  pull_request:
    types: [labeled]

jobs:
  update-issue:
    if: github.event.label.name == 'ready-for-test'
    runs-on: ubuntu-latest

    steps:
      - name: Get linked issues
        id: linked
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const pr = context.payload.pull_request;

            const body = pr.body || '';
            const matches = [...body.matchAll(/#(\d+)/g)];

            if (!matches || matches.length === 0) {
              core.info('No linked issues found');
              return;
            }

            const issueNumbers = matches.map(m => m[1]);
            core.info(`Found ${issueNumbers.length} linked issue(s): ${issueNumbers.join(', ')}`);
            core.setOutput('issue_numbers', JSON.stringify(issueNumbers));

      - name: Update issues status in project
        if: steps.linked.outputs.issue_numbers
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const issueNumbers = JSON.parse('${{ steps.linked.outputs.issue_numbers }}');
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            for (const issueNumberStr of issueNumbers) {
              const issueNumber = Number(issueNumberStr);
              core.info(`Processing issue #${issueNumber}...`);

              try {
                // 1. Get Issue Node ID
                const issueData = await github.graphql(`
                  query ($owner: String!, $repo: String!, $number: Int!) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $number) {
                        id
                      }
                    }
                  }
                `, { owner, repo, number: issueNumber });

                if (!issueData.repository.issue) {
                  core.info(`Issue #${issueNumber} not found, skipping`);
                  continue;
                }

                const issueId = issueData.repository.issue.id;

                // 2. Get Project Item ID
                const projectData = await github.graphql(`
                  query ($issueId: ID!, $projectId: ID!) {
                    node(id: $issueId) {
                      ... on Issue {
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                            }
                          }
                        }
                      }
                    }
                  }
                `, {
                  issueId,
                  projectId: process.env.PROJECT_ID
                });

                const item = projectData.node.projectItems.nodes.find(
                  n => n.project.id === process.env.PROJECT_ID
                );

                if (!item) {
                  core.info(`Issue #${issueNumber} not in target project, skipping`);
                  continue;
                }

                // 3. Update Status
                await github.graphql(`
                  mutation ($itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: "${process.env.PROJECT_ID}"
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `, {
                  itemId: item.id,
                  fieldId: process.env.STATUS_FIELD,
                  optionId: process.env.STATUS_READY4TEST_OPTION
                });

                core.info(`Issue #${issueNumber} status updated to Ready4Test`);
              } catch (error) {
                core.warning(`Failed to update issue #${issueNumber}: ${error.message}`);
              }
            }

            core.info('All linked issues processed');
        env:
          PROJECT_ID: ${{ secrets.PROJECT_ID }}
          STATUS_FIELD: ${{ secrets.STATUS_FIELD }}
          STATUS_READY4TEST_OPTION: ${{ secrets.STATUS_READY4TEST_OPTION }}
