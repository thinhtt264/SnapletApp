name: Update Linked Issues Status

on:
  pull_request:
    types:
      - labeled

permissions:
  contents: read
  pull-requests: read
  issues: read
  projects: write

jobs:
  update-issue-status:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'ready-for-test'
    steps:
      - name: Update Linked Issues Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        id
                        number
                        projectItems(first: 10) {
                          nodes {
                            id
                            project {
                              id
                              title
                              fields(first: 50) {
                                nodes {
                                  ... on ProjectV2Field {
                                    id
                                    name
                                  }
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    name
                                    options {
                                      id
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const variables = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.payload.pull_request.number
            };

            const result = await github.graphql(query, variables);
            const issues = result.repository.pullRequest.closingIssuesReferences.nodes;

            if (issues.length === 0) {
              console.log('No linked issues found.');
              return;
            }

            for (const issue of issues) {
              console.log(`Processing issue #${issue.number}`);
              for (const item of issue.projectItems.nodes) {
                const project = item.project;
                const statusField = project.fields.nodes.find(f => f.name === 'Status');
                
                if (!statusField || !statusField.options) {
                  console.log(`Could not find 'Status' field with options in project "${project.title}"`);
                  continue;
                }

                const readyForTestOption = statusField.options.find(o => o.name === 'Ready4Test');
                if (!readyForTestOption) {
                  console.log(`Could not find 'Ready4Test' option in 'Status' field of project "${project.title}"`);
                  continue;
                }

                await github.graphql(`
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: statusField.id,
                  optionId: readyForTestOption.id
                });
                
                console.log(`Updated status of issue #${issue.number} to 'Ready4Test' in project "${project.title}"`);
              }
            }
