name: Update Linked Issues Status (Test)

on:
  pull_request:
    types:
      - labeled
      - unlabeled
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  issues: read
  repository-projects: write
  # Thêm permissions để đọc projects
  projects: read

jobs:
  update-issue-status:
    runs-on: ubuntu-latest
    # Chỉ chạy khi label là 'ready-for-test'
    if: github.event.label.name == 'ready-for-test'
    
    steps:
      - name: Debug - Log event data
        run: |
          echo "Event action: ${{ github.event.action }}"
          echo "Label name: ${{ github.event.label.name }}"
          echo "PR number: ${{ github.event.pull_request.number }}"
      
      - name: Update Linked Issues Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const action = context.payload.action; // 'labeled' hoặc 'unlabeled'
            const labelName = context.payload.label?.name || 'unknown';
            const targetStatus = action === 'labeled' ? 'Ready4Test' : 'In progress';
            
            console.log(`🚀 Workflow triggered!`);
            console.log(`Processing PR #${prNumber}`);
            console.log(`Action: ${action}`);
            console.log(`Label name: ${labelName}`);
            console.log(`Target status: ${targetStatus}`);
            
            // GraphQL query để lấy linked issues từ PR
            const prQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        id
                        number
                      }
                    }
                  }
                }
              }
            `;

            const prResult = await github.graphql(prQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber
            });
            
            const issues = prResult.repository.pullRequest.closingIssuesReferences.nodes;

            // Nếu không có linked issues, bỏ qua
            if (issues.length === 0) {
              console.log('ℹ️  No linked issues found for this PR. Skipping...');
              return;
            }

            console.log(`✅ Found ${issues.length} linked issue(s)`);

            // Xử lý từng linked issue
            for (const issue of issues) {
              console.log(`\n📋 Processing issue #${issue.number}`);
              
              // Query trực tiếp từ issue để lấy project items (đảm bảo lấy đầy đủ)
              // Note: projectItems nên trả về tất cả project items (user, org, repo projects)
              const issueQuery = `
                query($owner: String!, $repo: String!, $issueNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issueNumber) {
                      id
                      number
                      projectItems(first: 20) {
                        nodes {
                          id
                          fieldValues(first: 50) {
                            nodes {
                              ... on ProjectV2ItemFieldSingleSelectValue {
                                field {
                                  ... on ProjectV2FieldCommon {
                                    id
                                    name
                                  }
                                }
                                name
                              }
                            }
                          }
                          project {
                            id
                            title
                            number
                            fields(first: 50) {
                              nodes {
                                ... on ProjectV2Field {
                                  id
                                  name
                                }
                                ... on ProjectV2SingleSelectField {
                                  id
                                  name
                                  options {
                                    id
                                    name
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;
              
              let projectItems = [];
              
              try {
                const issueResult = await github.graphql(issueQuery, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issueNumber: issue.number
                });
                
                console.log(`  🔍 Query result for issue #${issue.number}:`, JSON.stringify(issueResult, null, 2));
                
                const issueNode = issueResult.repository.issue;
                const issueId = issueNode.id;
                projectItems = issueNode.projectItems.nodes;
                
                console.log(`  📦 Found ${projectItems.length} repository project item(s) for issue #${issue.number}`);
                console.log(`  🆔 Issue node ID: ${issueId}`);
                
                // Nếu không có trong repository project, thử query user/organization projects
                if (projectItems.length === 0) {
                  console.log(`  🔍 Checking user/organization projects for issue #${issue.number}...`);
                  
                  // Thử query user projects trước (vì owner có thể là user)
                  try {
                    const userQuery = `
                      query($login: String!, $issueId: ID!) {
                        user(login: $login) {
                          projectsV2(first: 20) {
                            nodes {
                              id
                              title
                              items(first: 10, filter: { contentId: $issueId }) {
                                nodes {
                                  id
                                  fieldValues(first: 50) {
                                    nodes {
                                      ... on ProjectV2ItemFieldSingleSelectValue {
                                        field {
                                          ... on ProjectV2FieldCommon {
                                            id
                                            name
                                          }
                                        }
                                        name
                                      }
                                    }
                                  }
                                  project {
                                    id
                                    title
                                    fields(first: 50) {
                                      nodes {
                                        ... on ProjectV2Field {
                                          id
                                          name
                                        }
                                        ... on ProjectV2SingleSelectField {
                                          id
                                          name
                                          options {
                                            id
                                            name
                                          }
                                        }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    `;
                    
                    const userResult = await github.graphql(userQuery, {
                      login: context.repo.owner,
                      issueId: issueId
                    });
                    
                    if (userResult.user && userResult.user.projectsV2) {
                      // Tìm project có chứa issue này
                      for (const project of userResult.user.projectsV2.nodes) {
                        if (project.items.nodes.length > 0) {
                          console.log(`  📦 Found issue in user project: "${project.title}"`);
                          projectItems = project.items.nodes;
                          // Thêm project info vào mỗi item
                          projectItems.forEach(item => {
                            item.project = project;
                          });
                          break;
                        }
                      }
                    }
                  } catch (userError) {
                    console.log(`  ⚠️  Could not query user projects:`, userError.message);
                    // Có thể owner là organization, không phải user
                  }
                  
                  // Nếu vẫn chưa tìm thấy, thử query organization projects
                  if (projectItems.length === 0) {
                    try {
                      const orgQuery = `
                        query($login: String!, $issueId: ID!) {
                          organization(login: $login) {
                            projectsV2(first: 20) {
                              nodes {
                                id
                                title
                                items(first: 10, filter: { contentId: $issueId }) {
                                  nodes {
                                    id
                                    fieldValues(first: 50) {
                                      nodes {
                                        ... on ProjectV2ItemFieldSingleSelectValue {
                                          field {
                                            ... on ProjectV2FieldCommon {
                                              id
                                              name
                                            }
                                          }
                                          name
                                        }
                                      }
                                    }
                                    project {
                                      id
                                      title
                                      fields(first: 50) {
                                        nodes {
                                          ... on ProjectV2Field {
                                            id
                                            name
                                          }
                                          ... on ProjectV2SingleSelectField {
                                            id
                                            name
                                            options {
                                              id
                                              name
                                            }
                                          }
                                        }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      `;
                      
                      const orgResult = await github.graphql(orgQuery, {
                        login: context.repo.owner,
                        issueId: issueId
                      });
                      
                      if (orgResult.organization && orgResult.organization.projectsV2) {
                        // Tìm project có chứa issue này
                        for (const project of orgResult.organization.projectsV2.nodes) {
                          if (project.items.nodes.length > 0) {
                            console.log(`  📦 Found issue in organization project: "${project.title}"`);
                            projectItems = project.items.nodes;
                            // Thêm project info vào mỗi item
                            projectItems.forEach(item => {
                              item.project = project;
                            });
                            break;
                          }
                        }
                      }
                    } catch (orgError) {
                      console.log(`  ⚠️  Could not query organization projects:`, orgError.message);
                    }
                  }
                }
                
                // Nếu vẫn không có project items, thử query tất cả projects và tìm issue
                if (projectItems.length === 0) {
                  console.log(`  🔍 Trying alternative approach: query all projects and find issue...`);
                  
                  try {
                    // Query tất cả projects của owner (user hoặc org)
                    const allProjectsQuery = `
                      query($login: String!) {
                        user(login: $login) {
                          projectsV2(first: 20) {
                            nodes {
                              id
                              title
                              number
                            }
                          }
                        }
                        organization(login: $login) {
                          projectsV2(first: 20) {
                            nodes {
                              id
                              title
                              number
                            }
                          }
                        }
                      }
                    `;
                    
                    const allProjectsResult = await github.graphql(allProjectsQuery, {
                      login: context.repo.owner
                    });
                    
                    const allProjects = [
                      ...(allProjectsResult.user?.projectsV2?.nodes || []),
                      ...(allProjectsResult.organization?.projectsV2?.nodes || [])
                    ];
                    
                    console.log(`  📋 Found ${allProjects.length} total project(s) to check`);
                    
                    // Query từng project để tìm issue
                    for (const project of allProjects) {
                      try {
                        const projectItemsQuery = `
                          query($projectId: ID!, $issueId: ID!) {
                            node(id: $projectId) {
                              ... on ProjectV2 {
                                items(first: 10, filter: { contentId: $issueId }) {
                                  nodes {
                                    id
                                    fieldValues(first: 50) {
                                      nodes {
                                        ... on ProjectV2ItemFieldSingleSelectValue {
                                          field {
                                            ... on ProjectV2FieldCommon {
                                              id
                                              name
                                            }
                                          }
                                          name
                                        }
                                      }
                                    }
                                    project {
                                      id
                                      title
                                      fields(first: 50) {
                                        nodes {
                                          ... on ProjectV2Field {
                                            id
                                            name
                                          }
                                          ... on ProjectV2SingleSelectField {
                                            id
                                            name
                                            options {
                                              id
                                              name
                                            }
                                          }
                                        }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        `;
                        
                        const projectItemsResult = await github.graphql(projectItemsQuery, {
                          projectId: project.id,
                          issueId: issueId
                        });
                        
                        if (projectItemsResult.node && projectItemsResult.node.items.nodes.length > 0) {
                          console.log(`  ✅ Found issue in project: "${project.title}" (ID: ${project.id})`);
                          projectItems = projectItemsResult.node.items.nodes;
                          // Thêm project info vào mỗi item
                          projectItems.forEach(item => {
                            item.project = projectItemsResult.node;
                          });
                          break;
                        }
                      } catch (projError) {
                        // Skip project nếu có lỗi
                        continue;
                      }
                    }
                  } catch (allProjError) {
                    console.log(`  ⚠️  Could not query all projects:`, allProjError.message);
                  }
                }
                
                // Nếu vẫn không có project items, bỏ qua
                if (projectItems.length === 0) {
                  console.log(`  ⚠️  Issue #${issue.number} is not in any project, skipping...`);
                  console.log(`  💡 Make sure the issue is added to a Project V2 (not classic project)`);
                  continue;
                }
              } catch (queryError) {
                console.error(`  ❌ Error querying issue #${issue.number}:`, queryError.message);
                console.error(`  📝 Error details:`, JSON.stringify(queryError, null, 2));
                continue;
              }

              // Xử lý từng project item của issue
              for (const item of projectItems) {
                const project = item.project;
                console.log(`  📁 Checking project: "${project.title}"`);
                
                // Tìm Status field trong project
                const statusField = project.fields.nodes.find(f => f.name === 'Status');
                
                if (!statusField || !statusField.options) {
                  console.log(`  ⚠️  Could not find 'Status' field with options in project "${project.title}", skipping...`);
                  continue;
                }

                // Lấy status hiện tại của issue trong project
                const currentStatusValue = item.fieldValues.nodes.find(
                  fv => fv.field && fv.field.name === 'Status'
                );
                
                const currentStatus = currentStatusValue ? currentStatusValue.name : null;
                console.log(`  📊 Current status: ${currentStatus || 'Not set'}`);

                // Tìm option tương ứng với target status
                const targetOption = statusField.options.find(o => o.name === targetStatus);
                if (!targetOption) {
                  console.log(`  ⚠️  Could not find '${targetStatus}' option in 'Status' field of project "${project.title}", skipping...`);
                  continue;
                }

                // Nếu status hiện tại đã là target status, bỏ qua
                if (currentStatus === targetStatus) {
                  console.log(`  ✅ Issue #${issue.number} already has status '${targetStatus}' in project "${project.title}", skipping update...`);
                  continue;
                }

                // Thực hiện update status
                console.log(`  🔄 Updating status from "${currentStatus || 'Not set'}" to "${targetStatus}"...`);
                
                try {
                  const updateMutation = `
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item {
                          id
                        }
                      }
                    }
                  `;
                  
                  await github.graphql(updateMutation, {
                    projectId: project.id,
                    itemId: item.id,
                    fieldId: statusField.id,
                    optionId: targetOption.id
                  });
                  
                  console.log(`  ✅ Successfully updated issue #${issue.number} status to '${targetStatus}' in project "${project.title}"`);
                } catch (error) {
                  console.error(`  ❌ Failed to update issue #${issue.number} status:`, error.message);
                  console.error(`  📝 Error details:`, error);
                }
              }
            }
            
            console.log('\n✨ Finished processing all linked issues');
