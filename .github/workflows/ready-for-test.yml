name: Update Linked Issues Status

on:
  pull_request:
    types:
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read
  issues: read
  repository-projects: write
  projects: read

jobs:
  update-issue-status:
    runs-on: ubuntu-latest
    # Chỉ chạy khi label là 'ready-for-test'
    if: github.event.label.name == 'ready-for-test'
    
    steps:
      - name: Update Linked Issues Status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const action = context.payload.action; // 'labeled' hoặc 'unlabeled'
            const targetStatus = action === 'labeled' ? 'Ready4Test' : 'In progress';
            
            console.log(`Processing PR #${prNumber}`);
            console.log(`Action: ${action}`);
            console.log(`Target status: ${targetStatus}`);
            
            // GraphQL query để lấy linked issues từ PR
            const prQuery = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        id
                        number
                      }
                    }
                  }
                }
              }
            `;

            const prResult = await github.graphql(prQuery, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber
            });
            
            const issues = prResult.repository.pullRequest.closingIssuesReferences.nodes;

            // Nếu không có linked issues, bỏ qua
            if (issues.length === 0) {
              console.log('ℹ️  No linked issues found for this PR. Skipping...');
              return;
            }

            console.log(`✅ Found ${issues.length} linked issue(s)`);

            // Xử lý từng linked issue
            for (const issue of issues) {
              console.log(`\n📋 Processing issue #${issue.number}`);
              
              // Query issue để lấy issue ID
              const issueIdQuery = `
                query($owner: String!, $repo: String!, $issueNumber: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $issueNumber) {
                      id
                    }
                  }
                }
              `;
              
              let issueId;
              try {
                const issueIdResult = await github.graphql(issueIdQuery, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issueNumber: issue.number
                });
                issueId = issueIdResult.repository.issue.id;
                console.log(`  🆔 Issue ID: ${issueId}`);
              } catch (error) {
                console.error(`  ❌ Error getting issue ID:`, error.message);
                continue;
              }
              
              // Query tất cả projects và tìm issue trong đó
              // Thử repository projects trước
              let projectItems = [];
              
              try {
                const repoProjectsQuery = `
                  query($owner: String!, $repo: String!) {
                    repository(owner: $owner, name: $repo) {
                      projectsV2(first: 20) {
                        nodes {
                          id
                          title
                          items(first: 100) {
                            nodes {
                              id
                              content {
                                ... on Issue {
                                  id
                                }
                              }
                              fieldValues(first: 50) {
                                nodes {
                                  ... on ProjectV2ItemFieldSingleSelectValue {
                                    field {
                                      ... on ProjectV2FieldCommon {
                                        id
                                        name
                                      }
                                    }
                                    name
                                  }
                                }
                              }
                              project {
                                id
                                title
                                fields(first: 50) {
                                  nodes {
                                    ... on ProjectV2Field {
                                      id
                                      name
                                    }
                                    ... on ProjectV2SingleSelectField {
                                      id
                                      name
                                      options {
                                        id
                                        name
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                `;
                
                const repoProjectsResult = await github.graphql(repoProjectsQuery, {
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                
                if (repoProjectsResult.repository && repoProjectsResult.repository.projectsV2) {
                  for (const project of repoProjectsResult.repository.projectsV2.nodes) {
                    // Filter items trong code để tìm issue
                    const matchingItems = project.items.nodes.filter(item => 
                      item.content && item.content.id === issueId
                    );
                    
                    if (matchingItems.length > 0) {
                      console.log(`  📦 Found issue in repository project: "${project.title}"`);
                      projectItems = matchingItems;
                      // Thêm project info vào mỗi item
                      projectItems.forEach(item => {
                        item.project = project;
                      });
                      break;
                    }
                  }
                }
              } catch (repoError) {
                console.log(`  ⚠️  Could not query repository projects:`, repoError.message);
              }
              
              // Nếu không tìm thấy trong repository projects, thử user projects
              if (projectItems.length === 0) {
                try {
                  console.log(`  🔍 Querying user projects for user: ${context.repo.owner}`);
                  const userProjectsQuery = `
                    query($login: String!) {
                      user(login: $login) {
                        projectsV2(first: 20) {
                          nodes {
                            id
                            title
                            items(first: 100) {
                              nodes {
                                id
                                content {
                                  ... on Issue {
                                    id
                                  }
                                }
                                fieldValues(first: 50) {
                                  nodes {
                                    ... on ProjectV2ItemFieldSingleSelectValue {
                                      field {
                                        ... on ProjectV2FieldCommon {
                                          id
                                          name
                                        }
                                      }
                                      name
                                    }
                                  }
                                }
                            project {
                              id
                              title
                              fields(first: 50) {
                                nodes {
                                  ... on ProjectV2Field {
                                    id
                                    name
                                  }
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    name
                                    options {
                                      id
                                      name
                                    }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  
                  const userProjectsResult = await github.graphql(userProjectsQuery, {
                    login: context.repo.owner
                  });
                  
                  console.log(`  📊 Found ${userProjectsResult.user?.projectsV2?.nodes?.length || 0} user project(s)`);
                  
                  if (userProjectsResult.user && userProjectsResult.user.projectsV2) {
                    for (const project of userProjectsResult.user.projectsV2.nodes) {
                      console.log(`  🔍 Checking user project: "${project.title}" (${project.items.nodes.length} items)`);
                      // Filter items trong code để tìm issue
                      const matchingItems = project.items.nodes.filter(item => 
                        item.content && item.content.id === issueId
                      );
                      
                      if (matchingItems.length > 0) {
                        console.log(`  📦 Found issue in user project: "${project.title}"`);
                        projectItems = matchingItems;
                        // Thêm project info vào mỗi item
                        projectItems.forEach(item => {
                          item.project = project;
                        });
                        break;
                      }
                    }
                  }
                } catch (userError) {
                  console.log(`  ⚠️  Could not query user projects:`, userError.message);
                }
              }
              
              // Nếu vẫn không tìm thấy, thử organization projects (chỉ nếu owner là organization)
              if (projectItems.length === 0) {
                try {
                  console.log(`  🔍 Querying organization projects for: ${context.repo.owner}`);
                  const orgProjectsQuery = `
                    query($login: String!) {
                      organization(login: $login) {
                        projectsV2(first: 20) {
                          nodes {
                            id
                            title
                            items(first: 100) {
                              nodes {
                                id
                                content {
                                  ... on Issue {
                                    id
                                  }
                                }
                                fieldValues(first: 50) {
                                  nodes {
                                    ... on ProjectV2ItemFieldSingleSelectValue {
                                      field {
                                        ... on ProjectV2FieldCommon {
                                          id
                                          name
                                        }
                                      }
                                      name
                                    }
                                  }
                                }
                                project {
                                  id
                                  title
                                  fields(first: 50) {
                                    nodes {
                                      ... on ProjectV2Field {
                                        id
                                        name
                                      }
                                      ... on ProjectV2SingleSelectField {
                                        id
                                        name
                                        options {
                                          id
                                          name
                                        }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  `;
                  
                  const orgProjectsResult = await github.graphql(orgProjectsQuery, {
                    login: context.repo.owner
                  });
                  
                  if (orgProjectsResult.organization && orgProjectsResult.organization.projectsV2) {
                    for (const project of orgProjectsResult.organization.projectsV2.nodes) {
                      // Filter items trong code để tìm issue
                      const matchingItems = project.items.nodes.filter(item => 
                        item.content && item.content.id === issueId
                      );
                      
                      if (matchingItems.length > 0) {
                        console.log(`  📦 Found issue in organization project: "${project.title}"`);
                        projectItems = matchingItems;
                        // Thêm project info vào mỗi item
                        projectItems.forEach(item => {
                          item.project = project;
                        });
                        break;
                      }
                    }
                  }
                } catch (orgError) {
                  // Bỏ qua lỗi nếu owner không phải organization (đây là expected behavior)
                  if (orgError.message && orgError.message.includes('Could not resolve to an Organization')) {
                    console.log(`  ℹ️  Owner "${context.repo.owner}" is not an organization, skipping organization projects query`);
                  } else {
                    console.log(`  ⚠️  Could not query organization projects:`, orgError.message);
                  }
                }
              }
              
              // Nếu vẫn không có project items, bỏ qua
              if (projectItems.length === 0) {
                console.log(`  ⚠️  Issue #${issue.number} is not in any project, skipping...`);
                continue;
              }

              // Xử lý từng project item của issue
              for (const item of projectItems) {
                const project = item.project;
                console.log(`  📁 Checking project: "${project.title}"`);
                
                // Tìm Status field trong project
                const statusField = project.fields.nodes.find(f => f.name === 'Status');
                
                if (!statusField || !statusField.options) {
                  console.log(`  ⚠️  Could not find 'Status' field with options in project "${project.title}", skipping...`);
                  continue;
                }

                // Lấy status hiện tại của issue trong project
                const currentStatusValue = item.fieldValues.nodes.find(
                  fv => fv.field && fv.field.name === 'Status'
                );
                
                const currentStatus = currentStatusValue ? currentStatusValue.name : null;
                console.log(`  📊 Current status: ${currentStatus || 'Not set'}`);

                // Tìm option tương ứng với target status
                const targetOption = statusField.options.find(o => o.name === targetStatus);
                if (!targetOption) {
                  console.log(`  ⚠️  Could not find '${targetStatus}' option in 'Status' field of project "${project.title}", skipping...`);
                  continue;
                }

                // Nếu status hiện tại đã là target status, bỏ qua
                if (currentStatus === targetStatus) {
                  console.log(`  ✅ Issue #${issue.number} already has status '${targetStatus}' in project "${project.title}", skipping update...`);
                  continue;
                }

                // Thực hiện update status
                console.log(`  🔄 Updating status from "${currentStatus || 'Not set'}" to "${targetStatus}"...`);
                
                try {
                  const updateMutation = `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                  `;
                  
                  await github.graphql(updateMutation, {
                  projectId: project.id,
                  itemId: item.id,
                  fieldId: statusField.id,
                    optionId: targetOption.id
                  });
                  
                  console.log(`  ✅ Successfully updated issue #${issue.number} status to '${targetStatus}' in project "${project.title}"`);
                } catch (error) {
                  console.error(`  ❌ Failed to update issue #${issue.number} status:`, error.message);
                  console.error(`  📝 Error details:`, error);
                }
              }
            }
            
            console.log('\n✨ Finished processing all linked issues');
