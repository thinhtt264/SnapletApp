name: Update Linked Issues Status

on:
  pull_request:
    types:
      - labeled

permissions:
  contents: read
  pull-requests: read
  issues: read
  repository-projects: write
  actions: read

jobs:
  update-issue-status:
    runs-on: ubuntu-latest
    if: |
      github.event.action == 'labeled' &&
      github.event.label.name == 'ready-for-test'
    steps:
      - name: Wait a moment for build workflow to complete
        run: sleep 5
      
      - name: Check build workflow status
        uses: actions/github-script@v7
        id: check-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const prSha = context.payload.pull_request.head.sha;
            
            console.log(`Checking build status for PR #${prNumber} (SHA: ${prSha})`);
            
            // Tìm workflow run của "Android Build & Distribute to Firebase" cho PR này
            const workflowRuns = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'android-distribute.yml',
              head_sha: prSha,
              per_page: 10
            });
            
            if (workflowRuns.data.workflow_runs.length === 0) {
              console.log('No build workflow runs found for this PR');
              core.setFailed('Build workflow has not run for this PR yet');
              return;
            }
            
            // Lấy workflow run mới nhất
            const latestRun = workflowRuns.data.workflow_runs[0];
            console.log(`Found build workflow run: ${latestRun.id}, status: ${latestRun.status}, conclusion: ${latestRun.conclusion}`);
            
            // Kiểm tra xem workflow đã hoàn thành và thành công chưa
            if (latestRun.status !== 'completed') {
              console.log(`Build workflow is still running (status: ${latestRun.status})`);
              core.setFailed(`Build workflow is still running. Current status: ${latestRun.status}`);
              return;
            }
            
            if (latestRun.conclusion !== 'success') {
              console.log(`Build workflow did not succeed (conclusion: ${latestRun.conclusion})`);
              core.setFailed(`Build workflow did not succeed. Conclusion: ${latestRun.conclusion}`);
              return;
            }
            
            console.log('✅ Build workflow completed successfully');
            core.setOutput('build_success', 'true');
      
      - name: Update Linked Issues Status
        if: steps.check-build.outputs.build_success == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            console.log(`Processing PR #${prNumber} - updating linked issues status`);
            
            const query = `
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        id
                        number
                        projectItems(first: 10) {
                          nodes {
                            id
                            fieldValues(first: 50) {
                              nodes {
                                ... on ProjectV2ItemFieldSingleSelectValue {
                                  field {
                                    ... on ProjectV2FieldCommon {
                                      id
                                      name
                                    }
                                  }
                                  name
                                }
                              }
                            }
                            project {
                              id
                              title
                              fields(first: 50) {
                                nodes {
                                  ... on ProjectV2Field {
                                    id
                                    name
                                  }
                                  ... on ProjectV2SingleSelectField {
                                    id
                                    name
                                    options {
                                      id
                                      name
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const variables = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: prNumber
            };

            const result = await github.graphql(query, variables);
            const issues = result.repository.pullRequest.closingIssuesReferences.nodes;

            if (issues.length === 0) {
              console.log('❌ No linked issues found for this PR.');
              return;
            }

            console.log(`✅ Found ${issues.length} linked issue(s)`);

            for (const issue of issues) {
              console.log(`\n📋 Processing issue #${issue.number}`);
              
              if (issue.projectItems.nodes.length === 0) {
                console.log(`  ⚠️  Issue #${issue.number} is not in any project, skipping...`);
                continue;
              }

              for (const item of issue.projectItems.nodes) {
                const project = item.project;
                console.log(`  📁 Checking project: "${project.title}"`);
                
                // Tìm Status field trong project
                const statusField = project.fields.nodes.find(f => f.name === 'Status');
                
                if (!statusField || !statusField.options) {
                  console.log(`  ⚠️  Could not find 'Status' field with options in project "${project.title}", skipping...`);
                  continue;
                }

                // Kiểm tra status hiện tại của issue trong project
                const currentStatusValue = item.fieldValues.nodes.find(
                  fv => fv.field && fv.field.name === 'Status'
                );
                
                const currentStatus = currentStatusValue ? currentStatusValue.name : null;
                console.log(`  📊 Current status: ${currentStatus || 'Not set'}`);

                // Nếu đã là Ready4Test thì skip
                if (currentStatus === 'Ready4Test') {
                  console.log(`  ✅ Issue #${issue.number} already has status 'Ready4Test' in project "${project.title}", skipping update...`);
                  continue;
                }

                // Tìm option Ready4Test
                const readyForTestOption = statusField.options.find(o => o.name === 'Ready4Test');
                if (!readyForTestOption) {
                  console.log(`  ⚠️  Could not find 'Ready4Test' option in 'Status' field of project "${project.title}", skipping...`);
                  continue;
                }

                // Update status sang Ready4Test
                console.log(`  🔄 Updating status from "${currentStatus || 'Not set'}" to "Ready4Test"...`);
                
                try {
                  await github.graphql(`
                    mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                      updateProjectV2ItemFieldValue(input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }) {
                        projectV2Item {
                          id
                        }
                      }
                    }
                  `, {
                    projectId: project.id,
                    itemId: item.id,
                    fieldId: statusField.id,
                    optionId: readyForTestOption.id
                  });
                  
                  console.log(`  ✅ Successfully updated issue #${issue.number} status to 'Ready4Test' in project "${project.title}"`);
                } catch (error) {
                  console.error(`  ❌ Failed to update issue #${issue.number} status:`, error.message);
                }
              }
            }
            
            console.log('\n✨ Finished processing all linked issues');
